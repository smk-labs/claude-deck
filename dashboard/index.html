<title>Claude Deck</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link id="favicon" rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cg stroke='%23C96442' stroke-width='1.6' stroke-linecap='round'%3E%3Cline x1='12' y1='12' x2='12' y2='2.2'/%3E%3Cline x1='12' y1='12' x2='16.6' y2='3.6'/%3E%3Cline x1='12' y1='12' x2='19.8' y2='7'/%3E%3Cline x1='12' y1='12' x2='21.6' y2='11.6'/%3E%3Cline x1='12' y1='12' x2='20.6' y2='16.4'/%3E%3Cline x1='12' y1='12' x2='17.4' y2='20.2'/%3E%3Cline x1='12' y1='12' x2='12.4' y2='21.8'/%3E%3Cline x1='12' y1='12' x2='7.2' y2='20.6'/%3E%3Cline x1='12' y1='12' x2='3.6' y2='17'/%3E%3Cline x1='12' y1='12' x2='2.2' y2='12.4'/%3E%3Cline x1='12' y1='12' x2='3.2' y2='7.4'/%3E%3Cline x1='12' y1='12' x2='7.6' y2='3.2'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #FAF9F5;
    --card: #FFFFFF;
    --text: #191919;
    --muted: #6E6C64;
    --border: #E8E6DC;
    --accent: #C96442;
    --accent-hover: #B55535;
    --accent-fg: #FFFFFF;
    --amber: #D97706;
    --red: #DC2626;
    --green: #2F9E44;
    --track: #ECE9DF;
    --shimmer: rgba(25, 25, 25, 0.06);
    --serif: 'Tiempos Text', ui-serif, Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #262624;
      --card: #30302E;
      --text: #ECEAE4;
      --muted: #A29F96;
      --border: #3F3E3A;
      --accent: #D97757;
      --accent-hover: #E28866;
      --accent-fg: #262624;
      --track: #3F3E3A;
      --shimmer: rgba(236, 234, 228, 0.06);
    }
  }
  :root[data-theme="light"] {
    --bg: #FAF9F5;
    --card: #FFFFFF;
    --text: #191919;
    --muted: #6E6C64;
    --border: #E8E6DC;
    --accent: #C96442;
    --accent-hover: #B55535;
    --accent-fg: #FFFFFF;
    --track: #ECE9DF;
    --shimmer: rgba(25, 25, 25, 0.06);
  }
  :root[data-theme="dark"] {
    --bg: #262624;
    --card: #30302E;
    --text: #ECEAE4;
    --muted: #A29F96;
    --border: #3F3E3A;
    --accent: #D97757;
    --accent-hover: #E28866;
    --accent-fg: #262624;
    --track: #3F3E3A;
    --shimmer: rgba(236, 234, 228, 0.06);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
  }
  body { min-height: 100vh; }
  a { color: inherit; }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .mark { flex-shrink: 0; color: var(--accent); }
  .wordmark {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 17px;
    letter-spacing: -0.015em;
    color: var(--text);
  }
  .count {
    font-size: 12px;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border);
    padding: 2px 9px;
    border-radius: 999px;
  }
  .spacer { flex: 1; }
  .updated { font-size: 12px; color: var(--muted); margin-right: 4px; font-variant-numeric: tabular-nums; }
  button.refresh {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: background-color 150ms ease, color 150ms ease, border-color 150ms ease;
  }
  button.refresh:hover { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
  button.refresh svg { transition: transform 0.5s ease; }
  button.refresh.spinning svg { transform: rotate(360deg); }

  button.theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    padding: 0;
    transition: background-color 150ms ease, color 150ms ease, border-color 150ms ease;
  }
  button.theme-toggle:hover { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
  button.theme-toggle .icon-sun,
  button.theme-toggle .icon-moon { display: none; }
  html.theme-resolved-dark button.theme-toggle .icon-sun { display: block; }
  html.theme-resolved-light button.theme-toggle .icon-moon { display: block; }

  main { max-width: 1160px; margin: 0 auto; padding: 28px 24px 60px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: border-color 150ms ease, transform 150ms ease;
  }
  .card:hover {
    border-color: var(--muted);
    transform: translateY(-1px);
  }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .name-wrap { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .name-col { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .name {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 17.5px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .email {
    font-size: 13px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #B8B5AA;
    flex-shrink: 0;
  }
  .dot.running {
    background: var(--green);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(47, 158, 68, 0.4); }
    50% { box-shadow: 0 0 0 5px rgba(47, 158, 68, 0); }
  }
  button.open {
    background: var(--accent);
    color: var(--accent-fg);
    border: 1px solid var(--accent);
    padding: 6px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    flex-shrink: 0;
    transition: background-color 150ms ease, border-color 150ms ease;
  }
  button.open:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button.open:active { filter: brightness(0.96); }
  button.open.focus {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  button.open.focus:hover { background: var(--accent); color: var(--accent-fg); }

  .orgs { display: flex; flex-direction: column; }
  .org-block { padding: 14px 0; }
  .org-block:first-child { padding-top: 2px; }
  .org-block:last-child { padding-bottom: 0; }
  .org-block + .org-block { border-top: 1px solid var(--border); }
  .org-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
  }
  .org-badge {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--track);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: center;
    font-family: var(--sans);
  }
  .org-name {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .org-plan {
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .windows { display: flex; flex-direction: column; gap: 14px; }
  .window-group { display: flex; flex-direction: column; gap: 10px; }
  .group-heading {
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  .window-row { display: flex; flex-direction: column; gap: 6px; }
  .window-label-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
  }
  .window-label { color: var(--text); }
  .window-pct { color: var(--muted); font-variant-numeric: tabular-nums; }
  .track {
    height: 8px;
    border-radius: 999px;
    background: var(--track);
    overflow: hidden;
  }
  .fill {
    height: 100%;
    border-radius: 999px;
    background: var(--accent);
    transition: width 300ms ease;
  }
  .fill.warn { background: var(--amber); }
  .fill.danger { background: var(--red); }
  .resets { font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }

  .error-state {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    color: var(--muted);
    font-size: 13px;
  }
  .error-state svg { flex-shrink: 0; color: var(--accent); margin-top: 1px; }
  .error-state .msg { color: var(--text); font-weight: 500; margin-bottom: 2px; }
  .error-state .hint { font-size: 12px; }

  .org-error {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    color: var(--muted);
    font-size: 12.5px;
  }
  .org-error svg { flex-shrink: 0; color: var(--accent); margin-top: 1px; width: 15px; height: 15px; }

  .skeleton { position: relative; overflow: hidden; }
  .skeleton .bar {
    height: 10px;
    border-radius: 6px;
    background: var(--shimmer);
    margin-bottom: 10px;
  }
  .skeleton::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, var(--shimmer), transparent);
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .empty {
    max-width: 480px;
    margin: 60px auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px;
    text-align: center;
  }
  .empty h2 { margin: 0 0 8px; font-family: var(--serif); font-weight: 600; font-size: 19px; }
  .empty p.lead { color: var(--muted); font-size: 13.5px; margin: 0 0 20px; }
  .steps { list-style: none; margin: 0; padding: 0; text-align: left; display: flex; flex-direction: column; gap: 14px; }
  .steps li { display: flex; gap: 12px; align-items: flex-start; }
  .step-num {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans);
  }
  .steps code {
    background: var(--track);
    padding: 1px 6px;
    border-radius: 5px;
    font-size: 12.5px;
  }
  .steps span { font-size: 13.5px; padding-top: 2px; }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 24px;
  }
</style>

<script>
(function () {
  var STORAGE_KEY = 'claude-deck-theme';
  var root = document.documentElement;
  var media = window.matchMedia('(prefers-color-scheme: dark)');

  var params = new URLSearchParams(location.search);
  var urlTheme = params.get('theme');
  var explicit = null;
  if (urlTheme === 'light' || urlTheme === 'dark') {
    explicit = urlTheme;
  } else {
    try {
      var stored = localStorage.getItem(STORAGE_KEY);
      if (stored === 'light' || stored === 'dark') explicit = stored;
    } catch (e) { /* localStorage unavailable */ }
  }

  function resolvedTheme() {
    if (explicit) return explicit;
    return media.matches ? 'dark' : 'light';
  }

  function applyResolvedClass() {
    var resolved = resolvedTheme();
    root.classList.remove('theme-resolved-light', 'theme-resolved-dark');
    root.classList.add('theme-resolved-' + resolved);
  }

  if (explicit) {
    root.dataset.theme = explicit;
  }
  applyResolvedClass();

  media.addEventListener('change', function () {
    if (!explicit) applyResolvedClass();
  });

  window.addEventListener('DOMContentLoaded', function () {
    var btn = document.getElementById('theme-toggle-btn');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var next = resolvedTheme() === 'dark' ? 'light' : 'dark';
      explicit = next;
      root.dataset.theme = next;
      applyResolvedClass();
      try { localStorage.setItem(STORAGE_KEY, next); } catch (e) { /* localStorage unavailable */ }
    });
  });
})();

(function () {
  var state = { profiles: [], usage: {}, fetchedAt: null, loading: true };
  var lastFetchTime = null;

  function el(tag, className, html) {
    var e = document.createElement(tag);
    if (className) e.className = className;
    if (html != null) e.innerHTML = html;
    return e;
  }

  function warningIcon() {
    return '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M10.3 3.9a2 2 0 0 1 3.4 0l8 14A2 2 0 0 1 20 21H4a2 2 0 0 1-1.7-3.1l8-14Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>' +
      '<path d="M12 9v4M12 17h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
  }

  var WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  var MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  function fmtClock(d) {
    var h = d.getHours();
    var m = d.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    var h12 = h % 12;
    if (h12 === 0) h12 = 12;
    var mm = m < 10 ? '0' + m : String(m);
    return h12 + ':' + mm + ' ' + ampm;
  }

  // Session windows (the app's "Current session"): relative countdown,
  // e.g. "Resets in 2 hr 1 min" / "Resets in 41 min". No countdown seconds.
  function fmtResetSession(iso) {
    if (!iso) return '';
    var diff = new Date(iso).getTime() - Date.now();
    if (diff <= 0) return 'Resets shortly';
    var mins = Math.round(diff / 60000);
    var h = Math.floor(mins / 60);
    var m = mins % 60;
    if (h <= 0) return 'Resets in ' + m + ' min';
    return 'Resets in ' + h + ' hr ' + m + ' min';
  }

  // Weekly/other windows: absolute local time, e.g. "Resets Fri 12:00 PM",
  // or "Resets Jul 12" once more than 7 days out.
  function fmtResetAbsolute(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var diffDays = (d.getTime() - Date.now()) / 86400000;
    if (diffDays > 7) {
      return 'Resets ' + MONTHS[d.getMonth()] + ' ' + d.getDate();
    }
    return 'Resets ' + WEEKDAYS[d.getDay()] + ' ' + fmtClock(d);
  }

  function fmtResetFor(group, iso) {
    return group === 'session' ? fmtResetSession(iso) : fmtResetAbsolute(iso);
  }

  function fmtAgo(ms) {
    var s = Math.round(ms / 1000);
    if (s < 60) return 'Last updated: less than a minute ago';
    var m = Math.round(s / 60);
    return 'Last updated: ' + m + (m === 1 ? ' minute ago' : ' minutes ago');
  }

  function fillClass(pct) {
    if (pct >= 90) return 'fill danger';
    if (pct >= 70) return 'fill warn';
    return 'fill';
  }

  function renderSkeletonCard() {
    var card = el('div', 'card skeleton');
    card.appendChild(el('div', 'bar', ''));
    var b2 = el('div', 'bar', '');
    b2.style.width = '70%';
    card.appendChild(b2);
    var b3 = el('div', 'bar', '');
    b3.style.width = '85%';
    card.appendChild(b3);
    return card;
  }

  var GROUP_HEADINGS = { weekly: 'Weekly limits', other: 'Other limits' };

  function renderWindowRow(w) {
    var row = el('div', 'window-row');
    var labelRow = el('div', 'window-label-row');
    labelRow.appendChild(el('span', 'window-label', w.label));
    labelRow.appendChild(el('span', 'window-pct', w.utilization + '% used'));
    row.appendChild(labelRow);
    var track = el('div', 'track');
    var fill = el('div', fillClass(w.utilization));
    fill.style.width = Math.min(100, Math.max(0, w.utilization)) + '%';
    track.appendChild(fill);
    row.appendChild(track);
    if (w.resetsAt) {
      var resets = el('div', 'resets');
      resets.dataset.resetsAt = w.resetsAt;
      resets.dataset.group = w.group;
      resets.textContent = fmtResetFor(w.group, w.resetsAt);
      row.appendChild(resets);
    }
    return row;
  }

  function monogram(name) {
    return (name || '?').trim().charAt(0).toUpperCase();
  }

  function renderOrgBlock(org) {
    var block = el('div', 'org-block');
    var head = el('div', 'org-head');
    head.appendChild(el('span', 'org-badge', monogram(org.name)));
    head.appendChild(el('span', 'org-name', org.name || 'Unknown org'));
    if (org.plan) head.appendChild(el('span', 'org-plan', org.plan));
    block.appendChild(head);

    if (!org.ok) {
      var errBox = el('div', 'org-error');
      errBox.appendChild(el('div', '', warningIcon()));
      errBox.appendChild(el('span', '', org.error || 'Could not load usage'));
      block.appendChild(errBox);
      return block;
    }

    var windows = el('div', 'windows');
    var all = org.windows || [];
    var sessionRows = all.filter(function (w) { return w.group === 'session'; });
    var weeklyRows = all.filter(function (w) { return w.group === 'weekly'; });
    var otherRows = all.filter(function (w) { return w.group !== 'session' && w.group !== 'weekly'; });

    sessionRows.forEach(function (w) { windows.appendChild(renderWindowRow(w)); });

    [['weekly', weeklyRows], ['other', otherRows]].forEach(function (pair) {
      var groupKey = pair[0];
      var rows = pair[1];
      if (!rows.length) return;
      var section = el('div', 'window-group');
      section.appendChild(el('div', 'group-heading', GROUP_HEADINGS[groupKey]));
      rows.forEach(function (w) { section.appendChild(renderWindowRow(w)); });
      windows.appendChild(section);
    });

    block.appendChild(windows);
    return block;
  }

  function renderCard(profile, usage) {
    var card = el('div', 'card');
    var head = el('div', 'card-head');
    var nameWrap = el('div', 'name-wrap');
    var running = usage ? usage.running : profile.running;
    nameWrap.appendChild(el('span', 'dot' + (running ? ' running' : '')));
    var nameCol = el('div', 'name-col');
    nameCol.appendChild(el('span', 'name', profile.name));
    if (usage && usage.email) {
      nameCol.appendChild(el('span', 'email', usage.email));
    }
    nameWrap.appendChild(nameCol);
    head.appendChild(nameWrap);

    var btn = el('button', 'open' + (running ? ' focus' : ''), running ? 'Focus' : 'Open');
    btn.addEventListener('click', function () { openProfile(profile.name, btn); });
    head.appendChild(btn);
    card.appendChild(head);

    if (!usage || usage.ok === undefined) {
      card.appendChild(renderSkeletonCard().firstChild ? renderSkeletonCard() : el('div'));
    } else if (!usage.ok) {
      var errBox = el('div', 'error-state');
      var iconWrap = el('div', '', warningIcon());
      errBox.appendChild(iconWrap);
      var textWrap = el('div');
      textWrap.appendChild(el('div', 'msg', 'Could not load usage'));
      textWrap.appendChild(el('div', 'hint', usage.error || 'unknown error'));
      errBox.appendChild(textWrap);
      card.appendChild(errBox);
    } else {
      var orgsWrap = el('div', 'orgs');
      var orgs = usage.orgs || [];
      orgs.forEach(function (org) { orgsWrap.appendChild(renderOrgBlock(org)); });
      card.appendChild(orgsWrap);
    }
    return card;
  }

  function renderEmpty() {
    var wrap = el('div', 'empty');
    wrap.appendChild(el('h2', '', 'No profiles yet'));
    wrap.appendChild(el('p', 'lead', 'Set up Claude Deck to run multiple accounts side by side.'));
    var steps = el('ol', 'steps');
    var items = [
      'Run <code>claude-deck patch</code> to prepare Claude Desktop.',
      'Run <code>claude-deck open work</code> and log in.',
      'Usage appears here automatically.'
    ];
    items.forEach(function (html, i) {
      var li = el('li');
      li.appendChild(el('span', 'step-num', String(i + 1)));
      li.appendChild(el('span', '', html));
      steps.appendChild(li);
    });
    wrap.appendChild(steps);
    return wrap;
  }

  function render() {
    var grid = document.getElementById('grid');
    var content = document.getElementById('content');
    grid.innerHTML = '';

    var accountCount = state.profiles.length;
    var orgCount = 0;
    Object.keys(state.usage).forEach(function (name) {
      var u = state.usage[name];
      if (u && u.ok && Array.isArray(u.orgs)) orgCount += u.orgs.length;
    });
    var countText = accountCount + (accountCount === 1 ? ' account' : ' accounts');
    if (orgCount > accountCount) countText += ', ' + orgCount + ' orgs';
    document.getElementById('count').textContent = countText;

    if (!state.loading && state.profiles.length === 0) {
      content.innerHTML = '';
      content.appendChild(renderEmpty());
      return;
    }
    if (content.querySelector('.empty')) content.innerHTML = '<div class="grid" id="grid"></div>';
    grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (state.loading && state.profiles.length === 0) {
      for (var i = 0; i < 3; i++) grid.appendChild(renderSkeletonCard());
      return;
    }

    state.profiles.forEach(function (p) {
      grid.appendChild(renderCard(p, state.usage[p.name]));
    });
  }

  function tickUpdated() {
    if (!lastFetchTime) return;
    document.getElementById('updated').textContent = fmtAgo(Date.now() - lastFetchTime);
  }

  function tickResets() {
    document.querySelectorAll('.resets[data-resets-at]').forEach(function (elm) {
      elm.textContent = fmtResetFor(elm.dataset.group, elm.dataset.resetsAt);
    });
  }

  function openProfile(name, btn) {
    btn.disabled = true;
    var original = btn.textContent;
    btn.textContent = '...';
    fetch('/api/open', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Claude-Deck': '1' },
      body: JSON.stringify({ name: name })
    }).then(function () {
      btn.disabled = false;
      btn.textContent = original;
      setTimeout(loadProfiles, 1200);
    }).catch(function () {
      btn.disabled = false;
      btn.textContent = original;
    });
  }

  function loadProfiles() {
    return fetch('/api/profiles').then(function (r) { return r.json(); }).then(function (data) {
      state.profiles = data || [];
      state.loading = false;
      render();
    }).catch(function () {
      state.loading = false;
      render();
    });
  }

  function loadUsage(fresh) {
    var url = '/api/usage' + (fresh ? '?fresh=1' : '');
    return fetch(url).then(function (r) { return r.json(); }).then(function (data) {
      var map = {};
      (data.profiles || []).forEach(function (p) { map[p.name] = p; });
      state.usage = map;
      lastFetchTime = Date.now();
      render();
      tickUpdated();
    });
  }

  function refreshAll(fresh) {
    var btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    Promise.all([loadProfiles(), loadUsage(fresh)]).then(function () {
      setTimeout(function () { btn.classList.remove('spinning'); }, 500);
    }).catch(function () {
      btn.classList.remove('spinning');
    });
  }

  document.getElementById('refresh-btn').addEventListener('click', function () {
    refreshAll(true);
  });

  refreshAll(false);
  setInterval(function () { refreshAll(false); }, 5 * 60 * 1000);
  setInterval(tickUpdated, 1000);
  setInterval(tickResets, 30 * 1000);
})();
</script>
